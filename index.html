<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GameHub Classics</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  padding:15px;
  text-align:center;
  background:#020617;
}

#games {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.08);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3 {
  padding:10px;
  margin:0;
}

#gameContainer {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:999;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

#closeBtn {
  position:absolute;
  top:15px;
  right:15px;
  padding:10px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h1>🎮 Classic GameHub</h1>
</header>

<div id="games"></div>
<div id="player"></div>

<script>

// 🎮 CLASSIC GAMES

  let games = [

{name:"2048", url:"https://www.crazygames.com/embed/2048", embed:true, img:"https://picsum.photos/300/150?1"},

{name:"Tic Tac Toe", url:"https://www.crazygames.com/embed/tic-tac-toe", embed:true, img:"https://picsum.photos/300/150?2"},

{name:"Sudoku", url:"https://www.crazygames.com/embed/sudoku", embed:true, img:"https://picsum.photos/300/150?3"},

{name:"Chess", url:"https://www.crazygames.com/embed/chess", embed:true, img:"https://picsum.photos/300/150?4"},

{name:"Solitaire", url:"https://www.crazygames.com/embed/solitaire", embed:true, img:"https://picsum.photos/300/150?5"},

{name:"Minesweeper", url:"https://www.crazygames.com/embed/minesweeper", embed:true, img:"https://picsum.photos/300/150?6"},

{name:"Snake", url:"https://playsnake.org/", embed:false, img:"https://picsum.photos/300/150?7"},

{name:"Pacman", url:"https://www.google.com/logos/2010/pacman10-i.html", embed:false, img:"https://picsum.photos/300/150?8"},

{name:"Tetris", url:"https://tetris.com/play-tetris", embed:false, img:"https://picsum.photos/300/150?9"},

{name:"Pong", url:"https://ponggame.io/", embed:false, img:"https://picsum.photos/300/150?10"},

{name:"Breakout", url:"https://breakout.en.softonic.com/", embed:false, img:"https://picsum.photos/300/150?11"},

{name:"Flappy Bird", url:"https://flappybird.io/", embed:false, img:"https://picsum.photos/300/150?12"}

];

// anzeigen
function renderGames(){
  let g = document.getElementById("games");
  g.innerHTML = "";

  games.forEach(game=>{
    g.innerHTML += `
      <div class="card" onclick="play('${game.url}', ${game.embed})">
        <img src="${game.img}">
        <h3>${game.name}</h3>
      </div>
    `;
  });
}

// starten
function play(url, embed){
  if(embed){
    document.getElementById("player").innerHTML = `
      <div id="gameContainer">
        <button id="closeBtn" onclick="closeGame()">❌</button>
        <iframe src="${url}"></iframe>
      </div>
    `;
  } else {
    window.location.href = url;
  }
}

// schließen
function closeGame(){
  document.getElementById("player").innerHTML = "";
}

renderGames();

</script>

</body>
</html>
